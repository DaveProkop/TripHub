name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */4 * *'  # every 4 days at 08:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/trips?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "406" ]; then
            echo "Unexpected status $STATUS"
            exit 1
          fi
